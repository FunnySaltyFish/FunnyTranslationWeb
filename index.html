<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>译站 Transtation | 专业级全场景翻译工作台</title>
  <meta name="description" content="把多引擎、大模型与全场景翻译整合进同一个工作台。支持长文、图片、语音、漫画与悬浮窗翻译。" />

  <!-- No runtime font/CDN dependency. Keep the original type direction with local/system fonts. -->
  <style>
    /* 
  Design System: ElevenLabs Minimalist & Warm Theme
  Emphasis on whisper-thin typography, extreme whitespace, and sub-0.1 opacity shadows.
*/

    :root[data-theme="light"] {
      --bg-primary: #ffffff;
      --bg-primary-rgb: 255, 255, 255;
      --bg-secondary: #f5f5f5;
      --bg-warm: rgba(245, 242, 239, 0.8);

      --text-primary: #000000;
      --text-secondary: #4e4e4e;
      --text-muted: #777169;

      --border-light: #e5e5e5;
      --border-subtle: rgba(0, 0, 0, 0.05);

      /* ElevenLabs Signature Multi-layer Shadows */
      --shadow-inset: rgba(0, 0, 0, 0.075) 0px 0px 0px 0.5px inset, #fff 0px 0px 0px 0px inset;
      --shadow-outline: rgba(0, 0, 0, 0.06) 0px 0px 0px 1px, rgba(0, 0, 0, 0.04) 0px 1px 2px, rgba(0, 0, 0, 0.04) 0px 2px 4px;
      --shadow-card: rgba(0, 0, 0, 0.4) 0px 0px 1px, rgba(0, 0, 0, 0.04) 0px 4px 4px;
      --shadow-warm: rgba(78, 50, 23, 0.04) 0px 6px 16px;
    }

    :root[data-theme="dark"] {
      --bg-primary: #121110;
      --bg-primary-rgb: 18, 17, 16;
      --bg-secondary: #1a1918;
      --bg-warm: rgba(45, 42, 39, 0.8);

      --text-primary: #ffffff;
      --text-secondary: #b3b0ad;
      --text-muted: #8c8885;

      --border-light: #33312f;
      --border-subtle: rgba(255, 255, 255, 0.05);

      --shadow-inset: rgba(255, 255, 255, 0.075) 0px 0px 0px 0.5px inset, transparent 0px 0px 0px 0px inset;
      --shadow-outline: rgba(255, 255, 255, 0.06) 0px 0px 0px 1px, rgba(0, 0, 0, 0.2) 0px 2px 8px;
      --shadow-card: rgba(255, 255, 255, 0.1) 0px 0px 1px, rgba(0, 0, 0, 0.4) 0px 4px 12px;
      --shadow-warm: rgba(180, 130, 80, 0.06) 0px 6px 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "HarmonyOS Sans SC", "MiSans", "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    img,
    video {
      max-width: 100%;
      display: block;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* Typography System */
    .display-title,
    .section-title,
    .card-title {
      /* Using Noto Serif SC 300 to mimic Waldenburg's whisper-thin elegant look */
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", serif;
      font-weight: 300;
      color: var(--text-primary);
    }

    .display-title {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: clamp(2rem, 4vw, 2.75rem);
      line-height: 1.17;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 1.75rem;
      line-height: 1.13;
      margin-bottom: 12px;
    }

    .body-large {
      font-size: 1.25rem;
      line-height: 1.6;
      letter-spacing: 0.16px;
      /* Positive tracking for body text */
    }

    .body-standard {
      font-size: 1.0625rem;
      line-height: 1.6;
      letter-spacing: 0.16px;
    }

    .caption {
      font-size: 0.875rem;
      line-height: 1.5;
      letter-spacing: 0.14px;
    }

    .small {
      font-size: 0.81rem;
    }

    .micro {
      font-size: 0.75rem;
    }

    .text-muted {
      color: var(--text-muted);
    }

    .text-center {
      text-align: center;
    }

    /* Layout & Containers */
    .container {
      width: min(100% - 48px, 1200px);
      margin: 0 auto;
    }

    .section {
      padding: 120px 0;
    }

    .bg-light {
      background-color: var(--bg-secondary);
    }

    /* Shadows */
    .shadow-inset {
      box-shadow: var(--shadow-inset);
    }

    .shadow-outline {
      box-shadow: var(--shadow-inset), var(--shadow-outline);
    }

    .shadow-card {
      box-shadow: var(--shadow-card);
    }

    .shadow-warm {
      box-shadow: var(--shadow-warm), var(--shadow-outline);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: "HarmonyOS Sans SC", "MiSans", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-weight: 500;
      font-size: 0.94rem;
      border: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      border-radius: 9999px;
      /* Pill shape */
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-black {
      background-color: var(--text-primary);
      color: var(--bg-primary);
      padding: 12px 24px;
    }

    .btn-white {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      padding: 12px 24px;
      box-shadow: var(--shadow-outline);
    }

    /* The signature ElevenLabs warm stone button */
    .btn-warm {
      background-color: var(--bg-warm);
      color: var(--text-primary);
      padding: 12px 24px;
      /* Slight asymmetric padding */
      border-radius: 30px;
      box-shadow: var(--shadow-warm);
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", serif;
      /* Special touch */
      font-weight: 700;
    }

    .btn-warm svg {
      transition: transform 0.2s ease;
    }

    .btn-warm:hover svg {
      transform: translateX(4px);
    }

    .full-width {
      width: 100%;
    }

    /* Header */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background-color: rgba(var(--bg-primary-rgb), 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-subtle);
      padding: 16px 0;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand-name {
      font-family: "HarmonyOS Sans SC", "MiSans", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
    }

    .main-nav {
      display: flex;
      gap: 32px;
    }

    .main-nav a {
      font-size: 0.94rem;
      font-weight: 500;
      color: var(--text-secondary);
      transition: color 0.2s;
      letter-spacing: 0.15px;
    }

    .main-nav a:hover {
      color: var(--text-primary);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "HarmonyOS Sans SC", "MiSans", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
    }

    .icon-btn svg {
      display: block;
    }

    .icon-btn:hover {
      color: var(--text-primary);
    }

    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text-primary);
      cursor: pointer;
    }

    /* Hero Section */
    .hero {
      padding: 120px 0 80px;
    }

    .hero-container {
      display: grid;
      grid-template-columns: minmax(0, 1.18fr) minmax(260px, 0.82fr);
      gap: 64px;
      align-items: center;
    }

    .hero-copy {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .hero-cta {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .social-proof-micro {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.81rem;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 9999px;
      background-color: var(--bg-secondary);
      color: var(--text-secondary);
    }

    .tag-warm {
      font-size: 0.81rem;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 9999px;
      background-color: var(--bg-warm);
      color: var(--text-primary);
      display: inline-block;
    }

    .media-frame {
      border-radius: 24px;
      overflow: hidden;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-light);
    }

    .hero-media {
      justify-self: end;
      width: min(100%, 330px);
    }

    .media-frame video,
    .media-frame img {
      width: 100%;
      max-height: min(58vh, 520px);
      height: auto;
      object-fit: contain;
      background-color: var(--bg-secondary);
    }

    /* Bento Grid */
    .bento-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      margin-top: 64px;
    }

    .bento-large {
      grid-column: span 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
    }

    .card {
      background-color: var(--bg-primary);
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-content {
      padding: 40px;
      flex: 1;
    }

    .card-media {
      background-color: var(--bg-secondary);
      min-height: 240px;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .card-media img,
    .card-media video {
      width: 100%;
      height: auto;
      max-height: 440px;
      object-fit: contain;
      object-position: top;
    }

    .video-trigger {
      position: relative;
      display: grid;
      width: 100%;
      height: 100%;
      min-height: inherit;
      place-items: center;
      border: 0;
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      cursor: pointer;
    }

    .video-trigger img {
      width: 100%;
      height: auto;
      max-height: 440px;
      object-fit: contain;
      object-position: top;
    }

    .play-pill {
      position: absolute;
      left: 50%;
      bottom: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: 9999px;
      background-color: rgba(var(--bg-primary-rgb), 0.88);
      box-shadow: var(--shadow-outline);
      transform: translateX(-50%);
      font-size: 0.81rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .play-pill::before {
      content: "";
      width: 0;
      height: 0;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-left: 8px solid currentColor;
    }

    /* Scenarios Gallery */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-top: 64px;
    }

    .gallery-grid .card {
      border-radius: 16px;
    }

    .gallery-grid .video-trigger {
      height: auto;
      min-height: 0;
    }

    .gallery-grid video,
    .gallery-grid img {
      width: 100%;
      height: auto;
      max-height: 360px;
      object-fit: contain;
      background-color: var(--bg-secondary);
    }

    .card-footer {
      padding: 16px;
      border-top: 1px solid var(--border-subtle);
    }

    /* Testimonials */
    .testimonial-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-top: 64px;
    }

    .testimonial-card {
      padding: 40px 32px;
      justify-content: space-between;
    }

    .testimonial-card .author {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* Pricing */
    .pricing-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }

    .benefit-list {
      list-style: none;
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .benefit-list li {
      position: relative;
      padding-left: 24px;
    }

    .benefit-list li::before {
      content: "—";
      position: absolute;
      left: 0;
      color: var(--text-primary);
    }

    .pricing-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: stretch;
    }

    .pricing-cards .card {
      padding: 32px 24px;
      gap: 18px;
      min-height: 300px;
    }

    .pricing-cards .highlight {
      border: 1px solid var(--border-light);
    }

    .price {
      font-size: 3rem;
      font-family: "HarmonyOS Sans SC", "MiSans", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-weight: 500;
      letter-spacing: -0.05em;
      margin-top: 6px;
      display: flex;
      align-items: baseline;
      gap: 7px;
    }

    .price .small {
      letter-spacing: 0;
      color: var(--text-muted);
    }

    .pricing-cards .caption {
      margin-bottom: 18px;
    }

    .pricing-cards .btn {
      margin-top: auto;
    }

    /* Download */
    .download-layout {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 56px;
      align-items: center;
    }

    .download-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: stretch;
    }

    .download-card {
      padding: 32px 24px;
      gap: 18px;
      min-height: 330px;
    }

    .download-card .tag-warm {
      margin-bottom: 0;
    }

    .download-card .caption {
      margin-bottom: 4px;
    }

    .download-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: auto;
      min-height: 136px;
    }

    .download-note {
      padding-top: 8px;
      line-height: 1.2;
      text-align: center;
    }

    /* Footer */
    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 40px 0;
      border-top: 1px solid var(--border-subtle);
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: flex-end;
      align-items: center;
    }

    .footer-icp {
      white-space: nowrap;
    }

    /* Responsive */
    @media (max-width: 1024px) {

      .hero-container,
      .bento-large,
      .pricing-layout,
      .download-layout {
        grid-template-columns: 1fr;
      }

      .hero-media {
        justify-self: center;
        width: min(100%, 330px);
      }

      .hero-copy {
        text-align: center;
        align-items: center;
      }

      .hero-cta {
        justify-content: center;
      }

      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .testimonial-grid {
        grid-template-columns: 1fr;
      }

      .main-nav {
        display: none;
        /* In real implementation, show mobile menu */
      }

      .site-header[data-menu-open="true"] .main-nav {
        position: absolute;
        top: 100%;
        left: 24px;
        right: 24px;
        display: flex;
        flex-direction: column;
        gap: 0;
        padding: 8px;
        border: 1px solid var(--border-light);
        border-radius: 16px;
        background-color: var(--bg-primary);
        box-shadow: var(--shadow-outline);
      }

      .site-header[data-menu-open="true"] .main-nav a {
        padding: 12px 14px;
      }

      .mobile-menu-btn {
        display: block;
      }
    }

    @media (max-width: 640px) {
      .section {
        padding: 80px 0;
      }

      .bento-grid {
        grid-template-columns: 1fr;
      }

      .bento-large {
        grid-column: auto;
      }

      .gallery-grid,
      .pricing-cards,
      .download-cards {
        grid-template-columns: 1fr;
      }

      .container {
        width: min(100% - 32px, 1200px);
      }

      .hero {
        padding: 80px 0 64px;
      }

      .card-content {
        padding: 32px 24px;
      }

      .card-media {
        min-height: 0;
      }

      .card-media img,
      .card-media video,
      .card-media .video-trigger img {
        max-height: min(68vh, 520px);
      }

      .video-trigger {
        height: auto;
        min-height: 0;
      }

      .pricing-cards .highlight {
        transform: none;
      }

      .footer-inner {
        flex-direction: column;
        gap: 24px;
        text-align: center;
      }

      .footer-links {
        justify-content: center;
        row-gap: 12px;
      }

      .footer-icp {
        flex-basis: 100%;
        order: 10;
        color: var(--text-muted);
      }
    }
  </style>
</head>

<body>
  <!-- Navigation -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="#" class="brand">
        <span class="brand-name">Transtation</span>
      </a>

      <button class="mobile-menu-btn" data-i18n-attr="aria-label:nav.menuToggle">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 7h16M4 12h16M4 17h16" />
        </svg>
      </button>

      <nav class="main-nav">
        <a href="#features" data-i18n="nav.workflow"></a>
        <a href="#scenarios" data-i18n="nav.scenarios"></a>
        <a href="#proof" data-i18n="nav.reviews"></a>
        <a href="#download" data-i18n="nav.download"></a>
        <a href="#pricing" data-i18n="nav.plans"></a>
      </nav>

      <div class="header-actions">
        <button id="theme-toggle" class="icon-btn" data-i18n-attr="aria-label:nav.themeToggle">
          <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.5">
            <circle cx="12" cy="12" r="5" />
            <path
              d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
          </svg>
        </button>
        <button id="lang-toggle" class="icon-btn">EN</button>
        <a href="#download" class="btn btn-black" data-i18n="common.getApp"></a>
      </div>
    </div>
  </header>

  <main>
    <!-- Hero Section -->
    <section class="hero">
      <div class="container hero-container">
        <div class="hero-copy">
          <h1 class="display-title"><span data-i18n="hero.titleLine1"></span><br><span data-i18n="hero.titleLine2"></span></h1>
          <p class="body-large text-muted" data-i18n="hero.body"></p>
          <div class="hero-cta">
            <a href="#download" class="btn btn-warm">
              <span data-i18n="hero.primaryCta"></span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M5 12h14M12 5l7 7-7 7" />
              </svg>
            </a>
            <a href="https://github.com/FunnySaltyFish/Transtation-KMP" class="btn btn-white" target="_blank">
              <span data-i18n="hero.sourceCta"></span>
            </a>
          </div>
          <div class="social-proof-micro">
            <span class="tag" data-i18n="hero.downloads"></span>
            <span class="tag" data-i18n="hero.engines"></span>
            <span class="tag" data-i18n="hero.offline"></span>
          </div>
        </div>

        <div class="hero-media">
          <div class="media-frame shadow-card">
            <img src="assets/generated/hero-opening.png" data-i18n-attr="alt:media.heroAlt">
          </div>
        </div>
      </div>
    </section>

    <!-- Features Bento Grid -->
    <section id="features" class="section bg-light">
      <div class="container">
        <div class="section-header text-center">
          <h2 class="section-title" data-i18n="features.title"></h2>
          <p class="body-standard text-muted" data-i18n="features.body"></p>
        </div>

        <div class="bento-grid">
          <!-- Feature 1 -->
          <article class="card bento-large shadow-outline">
            <div class="card-content">
              <h3 class="card-title" data-i18n="features.compareTitle"></h3>
              <p class="body-standard text-muted" data-i18n="features.compareBody"></p>
            </div>
            <div class="card-media">
              <img src="assets/showcase/大模型翻译结果列表.jpg" data-i18n-attr="alt:media.compareAlt" loading="lazy">
            </div>
          </article>

          <!-- Feature 2 -->
          <article class="card shadow-outline">
            <div class="card-content">
              <h3 class="card-title" data-i18n="features.floatTitle"></h3>
              <p class="body-standard text-muted" data-i18n="features.floatBody"></p>
            </div>
            <div class="card-media">
              <button class="video-trigger" type="button" data-video="assets/showcase/悬浮窗文本翻译演示视频_batch.mp4">
                <img src="assets/showcase/悬浮窗屏幕翻译框选区域大模型结果.jpg" data-i18n-attr="alt:media.floatAlt">
                <span class="play-pill" data-i18n="common.playDemo"></span>
              </button>
            </div>
          </article>

          <!-- Feature 3 -->
          <article class="card shadow-outline">

      if (savedTheme) {
        root.setAttribute('data-theme', savedTheme);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        root.setAttribute('data-theme', 'dark');

      updateThemeIcon(root.getAttribute('data-theme'));

      function updateThemeIcon(theme) {
        const icon = themeToggleBtn.querySelector('svg');
        if (!icon) return;

        }

      themeToggleBtn.addEventListener('click', () => {
        const currentTheme = root.getAttribute('data-theme');

      function getInitialLang() {
        const savedLang = localStorage.getItem('lang');
        if (savedLang === 'zh' || savedLang === 'en') return savedLang;
        const browserLangs = navigator.languages?.length ? navigator.languages : [navigator.language || ''];
        return browserLangs.some((lang) => lang.toLowerCase().startsWith('zh')) ? 'zh' : 'en';
      }

      function applyLanguage(targetLang, shouldPersist = true) {
        const lang = targetLang === 'zh' ? 'zh' : 'en';
        const dictionary = i18n[lang];
        document.querySelectorAll('[data-i18n]').forEach((node) => {
          const key = node.getAttribute('data-i18n');
          if (dictionary[key]) node.textContent = dictionary[key];
        });
        document.querySelectorAll('[data-i18n-attr]').forEach((node) => {
          node.getAttribute('data-i18n-attr').split(',').forEach((binding) => {
            const [attr, key] = binding.split(':').map((value) => value.trim());
            if (attr && key && dictionary[key]) node.setAttribute(attr, dictionary[key]);
          });
        });
        document.title = lang === 'zh' ? defaultMeta.title : dictionary['meta.title'];
        const description = document.querySelector('meta[name="description"]');
        if (description) {
          description.setAttribute('content', lang === 'zh' ? defaultMeta.description : dictionary['meta.description']);
        }
        root.setAttribute('lang', lang === 'en' ? 'en' : 'zh-CN');
        langToggleBtn.textContent = lang === 'en' ? 'ZH' : 'EN';
        if (shouldPersist) localStorage.setItem('lang', lang);
      }

      applyLanguage(getInitialLang(), false);

      langToggleBtn.addEventListener('click', () => {
        applyLanguage(root.getAttribute('lang') === 'zh-CN' ? 'en' : 'zh');
      });

      // Mobile navigation
      const header = document.querySelector('.site-header');
      const menuToggleBtn = document.querySelector('.mobile-menu-btn');
      if (menuToggleBtn) {
        menuToggleBtn.addEventListener('click', () => {
          const isOpen = header.getAttribute('data-menu-open') === 'true';
          header.setAttribute('data-menu-open', String(!isOpen));
        });
      }

      document.querySelectorAll('.main-nav a').forEach((link) => {
        link.addEventListener('click', () => {
          header.setAttribute('data-menu-open', 'false');
        });
      });

      document.querySelectorAll('.video-trigger').forEach((button) => {
        button.addEventListener('click', () => {
          const src = button.getAttribute('data-video');
          const poster = button.querySelector('img')?.getAttribute('src') || '';
          const video = document.createElement('video');
          video.controls = true;
          video.autoplay = true;
          video.playsInline = true;
          video.preload = 'auto';
          if (poster) video.poster = poster;
          video.innerHTML = `<source src="${src}" type="video/mp4" />`;
          button.replaceWith(video);
          video.focus();
        });
      });

      // Smooth Scroll for Anchor Links
      document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
          e.preventDefault();
          const targetId = this.getAttribute('href');
          if (targetId === '#') return;

          const targetElement = document.querySelector(targetId);
          if (targetElement) {
            window.scrollTo({
              top: targetElement.offsetTop - 80, // Offset for sticky header
              behavior: 'smooth'
            });
          }
        });
      });
    });
  </script>
</body>

</html>
